<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSBIM综合数据分析系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0a0e27,#0d1b2a 50%,#1a1f3a);min-height:100vh;color:#fff;overflow-x:hidden}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;width:2px;height:2px;background:#00d4ff;border-radius:50%;opacity:0.6;animation:float 15s infinite linear}
@keyframes float{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.6}90%{opacity:0.6}100%{transform:translateY(-100vh) rotate(720deg);opacity:0}}
.header{background:linear-gradient(90deg,rgba(0,30,60,.95),rgba(0,20,40,.98));padding:15px 30px;border-bottom:2px solid #00d4ff;display:flex;justify-content:space-between;align-items:center;box-shadow:0 0 30px rgba(0,212,255,.3);position:relative;z-index:10}
.header::before{content:'';position:absolute;bottom:-2px;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00d4ff,#00ff88,#00d4ff,transparent);animation:scan 3s linear infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.header h1{font-size:24px;color:#00d4ff;text-shadow:0 0 20px #00d4ff;letter-spacing:3px}
.header .meta{display:flex;gap:20px;align-items:center}
.header .time,.header .status{color:#7fdbff;font-size:13px;font-family:'Consolas',monospace}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;animation:pulse 2s infinite}
.status-dot.online{background:#00ff88;box-shadow:0 0 10px #00ff88}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.2)}}
.page-nav{display:flex;align-items:center;gap:6px;padding:0 20px;background:linear-gradient(135deg,#0a1428,#0d1f44);border-bottom:3px solid #00d4ff;position:sticky;top:0;z-index:1000;height:58px}
.page-btn{position:relative;display:flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(180deg,rgba(0,100,180,.6),rgba(0,50,120,.7));border:1px solid rgba(0,180,255,.25);border-radius:6px;color:#fff;font-size:13px;cursor:pointer;margin:0}
.page-btn.active{background:linear-gradient(180deg,rgba(0,140,220,.7) 0%,rgba(0,80,160,.8) 100%);border-color:#00d4ff;color:#fff;font-weight:600;transform:translateY(-1px);box-shadow:0 0 30px rgba(0,200,255,.5),0 0 60px rgba(0,180,255,.2),inset 0 0 25px rgba(0,200,255,.15);text-shadow:0 0 20px rgba(0,220,255,1);animation:active-glow 1.5s ease-in-out infinite}
.stats-bar{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;padding:15px 25px;background:rgba(0,212,255,.08);border-bottom:1px solid rgba(0,212,255,.2);position:relative;z-index:5}
.stat-card{background:linear-gradient(145deg,rgba(20,40,70,.8),rgba(10,25,45,.9));border:1px solid rgba(0,212,255,.4);border-radius:8px;padding:12px 8px;text-align:center;transition:all .3s;box-shadow:0 0 15px rgba(0,212,255,.15);cursor:pointer}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 0 25px rgba(0,212,255,.3);border-color:#00d4ff}
.stat-card .label{color:#5a9fc9;font-size:11px;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px}
.stat-card .value{font-size:22px;font-weight:bold;color:#00d4ff;text-shadow:0 0 10px rgba(0,212,255,.5);font-family:'Consolas',monospace}
.stat-card .unit{font-size:10px;color:#666}
.stat-card .trend{font-size:10px;margin-top:3px}
.trend-up{color:#ff4444}
.trend-down{color:#00ff88}
.trend-stable{color:#ffaa00}
.main-content{display:flex;flex-direction:column;gap:15px;padding:15px 25px;position:relative;z-index:5}
.chart-container{background:linear-gradient(145deg,rgba(20,45,75,.7),rgba(10,28,50,.85));border:1px solid rgba(0,212,255,.25);border-radius:12px;padding:15px;box-shadow:0 0 25px rgba(0,212,255,.1);transition:all .3s}
.chart-container:hover{border-color:rgba(0,212,255,.5);box-shadow:0 0 40px rgba(0,212,255,.2)}
.chart-title{color:#00d4ff;font-size:14px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(0,212,255,.2);display:flex;align-items:center;gap:8px}
.chart-title::before{content:'◆';color:#00ff88;font-size:10px}
.footer-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 25px;background:rgba(0,15,30,.95);border-top:1px solid rgba(0,180,255,.25);font-size:13px;color:#4a9eff}

@keyframes active-glow {
    0%, 100% { box-shadow: 0 0 30px rgba(0,200,255,.5), 0 0 60px rgba(0,180,255,.2); }
    50% { box-shadow: 0 0 40px rgba(0,200,255,.7), 0 0 80px rgba(0,180,255,.3); }
}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="page-nav">
<button class="page-btn" onclick="location.href='index.html'"><span class="nav-icon">🏠</span>首页</button>
<button class="page-btn" onclick="location.href='trends.html'"><span class="nav-icon">📊</span>趋势监测</button>
<button class="page-btn" onclick="location.href='sensors.html'"><span class="nav-icon">📡</span>传感器运维</button>
<button class="page-btn active"><span class="nav-icon">📋</span>综合数据</button>
</div>
<div class="header">
<h1>🏭 RSBIM储罐结构安全智能监测系统</h1>
<div class="meta">
<div class="status"><span class="status-dot online"></span>系统在线</div>
<div class="time" id="currentTime">2026-04-30 12:00:00</div>
</div>
</div>
<div class="stats-bar">
<div class="stat-card"><div class="label">在线传感器</div><div class="value">48</div><div class="unit">个</div><div class="trend trend-stable">→ 正常</div></div>
<div class="stat-card"><div class="label">监测储罐</div><div class="value">12</div><div class="unit">座</div></div>
<div class="stat-card"><div class="label">平均应变</div><div class="value">34.8</div><div class="unit">με</div><div class="trend trend-down">↓ 1.2%</div></div>
<div class="stat-card"><div class="label">最大位移</div><div class="value">54.7</div><div class="unit">mm</div><div class="trend trend-stable">→ 稳定</div></div>
<div class="stat-card"><div class="label">沉降速率</div><div class="value">0.15</div><div class="unit">mm/d</div><div class="trend trend-down">↓ 正常</div></div>
<div class="stat-card"><div class="label">倾角变化</div><div class="value">0.05</div><div class="unit">°</div><div class="trend trend-stable">→ 正常</div></div>
<div class="stat-card"><div class="label">平均温度</div><div class="value">25.1</div><div class="unit">°C</div><div class="trend trend-up">↑ 0.3</div></div>
<div class="stat-card"><div class="label">告警数量</div><div class="value">0</div><div class="unit">危险</div><div style="color:#ffaa00;font-size:9px">1预警</div></div>
</div>
<div class="main-content">
<div class="chart-container">
<div class="chart-title">📈 应变状态详情 <button onclick="switchStrain(-1)" style="background:rgba(0,40,80,.8);border:1px solid rgba(0,212,255,.4);color:#00d4ff;padding:2px 8px;border-radius:3px;cursor:pointer;margin-left:10px">◀</button><button onclick="switchStrain(1)" style="background:rgba(0,40,80,.8);border:1px solid rgba(0,212,255,.4);color:#00d4ff;padding:2px 8px;border-radius:3px;cursor:pointer">▶</button> <span id="strainTankName" style="color:#00d4ff;font-weight:bold">1号储罐</span></div>
<div id="strainTrend" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;height:400px;overflow:auto"></div>
</div>
<div class="chart-container">
<div class="chart-title">📐 倾角状态详情 <button onclick="switchTilt(-1)" style="background:rgba(0,40,80,.8);border:1px solid rgba(0,212,255,.4);color:#00d4ff;padding:2px 8px;border-radius:3px;cursor:pointer;margin-left:10px">◀</button><button onclick="switchTilt(1)" style="background:rgba(0,40,80,.8);border:1px solid rgba(0,212,255,.4);color:#00d4ff;padding:2px 8px;border-radius:3px;cursor:pointer">▶</button> <span id="tiltTankName" style="color:#00d4ff;font-weight:bold">1号储罐</span></div>
<div id="tiltTrend" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;height:400px;overflow:auto"></div>
</div>
<div class="chart-container">
<div class="chart-title">📉 沉降状态详情 <button onclick="switchSettle(-1)" style="background:rgba(0,40,80,.8);border:1px solid rgba(0,212,255,.4);color:#00d4ff;padding:2px 8px;border-radius:3px;cursor:pointer;margin-left:10px">◀</button><button onclick="switchSettle(1)" style="background:rgba(0,40,80,.8);border:1px solid rgba(0,212,255,.4);color:#00d4ff;padding:2px 8px;border-radius:3px;cursor:pointer">▶</button> <span id="settleTankName" style="color:#00d4ff;font-weight:bold">1号储罐</span></div>
<div id="settleTrend" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;height:400px;overflow:auto"></div>
</div>
</div>
<div class="footer-bar">
<div style="flex:1">👁 数据采集周期: 5s &nbsp;&nbsp; 📡 传感器在线: 48/48</div>
<div>● RSBIM智能监测平台 v2.1 | 数据每10秒自动更新</div>
</div>
<script>
function createParticles(){
const c=document.getElementById('particles');
for(let i=0;i<50;i++){
const p=document.createElement('div');
p.className='particle';
p.style.left=Math.random()*100+'%';
p.style.animationDelay=Math.random()*15+'s';
p.style.animationDuration=(10+Math.random()*10)+'s';
c.appendChild(p);
}
}
createParticles();
var currentStrainTank=0,currentTiltTank=0,currentSettleTank=0;
var tankNames=["1号储罐","2号储罐","3号储罐","4号储罐","5号储罐","6号储罐","7号储罐","8号储罐","9号储罐","10号储罐","11号储罐","12号储罐"];
var sensorBaseData={strain:[],tilt:[],settle:[]};
for(var i=0;i<16;i++){sensorBaseData.strain.push(20+Math.random()*10);sensorBaseData.tilt.push(0.02+Math.random()*0.03);sensorBaseData.settle.push(1+Math.random()*1.5);}
function genSensorData(type){
var html="";
var base=type==='应变'?sensorBaseData.strain:(type==='倾角'?sensorBaseData.tilt:sensorBaseData.settle);
for(var i=0;i<16;i++){
var shouldChange=Math.random()<0.1;
var val=base[i];
if(shouldChange){
val=type==='应变'?(15+Math.random()*25):(type==='倾角'?Math.random()*0.1:0.1+Math.random()*3);
base[i]=val;
}
var color=type==='应变'?(val>35?"#ff4444":val>30?"#ffaa00":"#00ff88"):(type==='倾角'?(val>0.08?"#ff4444":val>0.05?"#ffaa00":"#00ff88"):(val>2.5?"#ff4444":val>1.8?"#ffaa00":"#00ff88"));
html+='<div style="background:rgba(0,30,60,.6);border:1px solid rgba(0,212,255,.2);border-radius:6px;padding:10px;text-align:center"><div style="color:#00d4ff;font-size:11px">S'+(i+1)+'</div><div style="color:'+color+';font-size:16px;font-weight:bold">'+val.toFixed(2)+'</div><div style="color:#888;font-size:9px">'+(type==='应变'?'με':type==='倾角'?'°':'mm')+'</div></div>';
}
return html;
}
function switchStrain(d){currentStrainTank=(currentStrainTank+d+12)%12;document.getElementById("strainTankName").textContent=tankNames[currentStrainTank];for(var i=0;i<16;i++){sensorBaseData.strain[i]=15+Math.random()*25;}document.getElementById("strainTrend").innerHTML=genSensorData("应变");}
function switchTilt(d){currentTiltTank=(currentTiltTank+d+12)%12;document.getElementById("tiltTankName").textContent=tankNames[currentTiltTank];for(var i=0;i<16;i++){sensorBaseData.tilt[i]=Math.random()*0.1;}document.getElementById("tiltTrend").innerHTML=genSensorData("倾角");}
function switchSettle(d){currentSettleTank=(currentSettleTank+d+12)%12;document.getElementById("settleTankName").textContent=tankNames[currentSettleTank];for(var i=0;i<16;i++){sensorBaseData.settle[i]=0.1+Math.random()*3;}document.getElementById("settleTrend").innerHTML=genSensorData("沉降");}
function updateTime(){document.getElementById('currentTime').textContent=new Date().toLocaleString('zh-CN')}
updateTime();
setInterval(updateTime,1000);
document.getElementById("strainTrend").innerHTML=genSensorData("应变");
document.getElementById("tiltTrend").innerHTML=genSensorData("倾角");
document.getElementById("settleTrend").innerHTML=genSensorData("沉降");
setInterval(function(){
document.getElementById("strainTrend").innerHTML=genSensorData("应变");
document.getElementById("tiltTrend").innerHTML=genSensorData("倾角");
document.getElementById("settleTrend").innerHTML=genSensorData("沉降");
},3000);
</script>
<div class="footer-bar" style="height:1px;background:rgba(0,180,255,.15);border:none"></div>
</body>
</html>
