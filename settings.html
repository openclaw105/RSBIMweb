<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - RSBIM矿山智能监测平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark-1: #0f172a;
            --dark-2: #1e293b;
            --dark-3: #334155;
            --light: #f1f5f9;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(148, 163, 184, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0c1e3e 0%, #1a3a6a 50%, #0f172a 100%);
            color: var(--light);
            min-height: 100vh;
        }
        
        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 30px;
        }
        
        .page-header {
            margin-bottom: 40px;
        }
        
        .page-title {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 设置页面样式 */
        .settings-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
        }
        
        .settings-sidebar {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
        }
        
        .settings-nav {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .settings-nav-item {
            padding: 15px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: var(--gray-2);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }
        
        .settings-nav-item:hover,
        .settings-nav-item.active {
            background: rgba(14, 165, 233, 0.1);
            color: white;
        }
        
        .settings-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
        }
        
        .settings-section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-help {
            font-size: 14px;
            color: var(--gray-2);
            margin-top: 8px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .checkbox-label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
        
        .radio-group {
            display: flex;
            gap: 25px;
            margin-top: 10px;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .settings-actions {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--card-border);
        }
        
        .settings-btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-save {
            background: linear-gradient(90deg, var(--primary), #0ea5e9);
            color: white;
        }
        
        .btn-reset {
            background: rgba(148, 163, 184, 0.1);
            color: var(--gray-2);
        }
        
        .btn-test {
            background: rgba(16, 185, 129, 0.1);
            color: var(--secondary);
        }
        
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: rgba(14, 165, 233, 0.1);
            color: var(--primary);
            border-radius: 8px;
            text-decoration: none;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .back-button:hover {
            background: rgba(14, 165, 233, 0.2);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="top-nav">
        <div class="nav-left">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-mountain"></i>
                </div>
                <div class="logo-text">
                    <h1>RSBIM矿山智能监测平台</h1>
                    <div class="logo-tag">系统设置</div>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-stats">
                <div class="nav-stat">
                    <div class="nav-stat-value" id="current-time">09:00</div>
                    <div class="nav-stat-label">当前时间</div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="menu-section">
            <div class="section-title">核心功能</div>
            <div class="menu-items">
                <a href="rsbim_coal_dashboard_full.html" class="menu-item">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>仪表板总览</span>
                </a>
                <a href="monitoring.html" class="menu-item">
                    <i class="fas fa-chart-line"></i>
                    <span>实时监测</span>
                </a>
                <a href="history.html" class="menu-item">
                    <i class="fas fa-history"></i>
                    <span>历史数据</span>
                </a>
            </div>
        </div>
        
        <div class="menu-section">
            <div class="section-title">预警管理</div>
            <div class="menu-items">
                <a href="alerts.html" class="menu-item">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>预警管理</span>
                </a>
                <a href="reports.html" class="menu-item">
                    <i class="fas fa-file-alt"></i>
                    <span>监测报告</span>
                </a>
            </div>
        </div>
        
        <div class="menu-section">
            <div class="section-title">系统管理</div>
            <div class="menu-items">
                <a href="devices.html" class="menu-item">
                    <i class="fas fa-microchip"></i>
                    <span>设备管理</span>
                </a>
                <a href="settings.html" class="menu-item active">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </a>
                <a href="upload.html" class="menu-item">
                    <i class="fas fa-upload"></i>
                    <span>数据上传</span>
                </a>
            </div>
        </div>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">系统设置</h1>
            <p class="page-subtitle">配置平台参数、预警阈值和系统行为</p>
        </div>
        
        <div class="settings-container">
            <!-- 设置侧边栏 -->
            <div class="settings-sidebar">
                <div class="settings-nav">
                    <a href="#" class="settings-nav-item active">
                        <i class="fas fa-sliders-h"></i> 基本设置
                    </a>
                    <a href="#" class="settings-nav-item">
                        <i class="fas fa-bell"></i> 预警设置
                    </a>
                    <a href="#" class="settings-nav-item">
                        <i class="fas fa-database"></i> 数据设置
                    </a>
                    <a href="#" class="settings-nav-item">
                        <i class="fas fa-shield-alt"></i> 安全设置
                    </a>
                    <a href="#" class="settings-nav-item">
                        <i class="fas fa-network-wired"></i> 网络设置
                    </a>
                    <a href="#" class="settings-nav-item">
                        <i class="fas fa-user-cog"></i> 用户管理
                    </a>
                </div>
            </div>
            
            <!-- 设置内容 -->
            <div class="settings-content">
                <!-- 基本设置 -->
                <div class="settings-section">
                    <h3 class="section-title">基本设置</h3>
                    
                    <div class="form-group">
                        <label class="form-label">平台名称</label>
                        <input type="text" class="form-control" value="RSBIM矿山智能监测平台">
                        <div class="form-help">显示在页面顶部的平台名称</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">时区设置</label>
                        <select class="form-control">
                            <option value="+8" selected>Asia/Shanghai (UTC+8)</option>
                            <option value="+0">UTC (格林威治标准时间)</option>
                            <option value="-5">America/New_York (UTC-5)</option>
                        </select>
                        <div class="form-help">设置系统显示的时间时区</div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">数据刷新频率</label>
                        <select class="form-control">
                            <option value="5">5秒 (高刷新率)</option>
                            <option value="10" selected>10秒 (标准刷新率)</option>
                            <option value="30">30秒 (低刷新率)</option>
                            <option value="60">1分钟 (节能模式)</option>
                        </select>
                        <div class="form-help">设置实时数据的刷新频率</div>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="auto-save" class="checkbox-input" checked>
                        <label for="auto-save" class="checkbox-label">
                            自动保存配置
                        </label>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="notifications" class="checkbox-input" checked>
                        <label for="notifications" class="checkbox-label">
                            启用桌面通知
                        </label>
                    </div>
                </div>
                
                <!-- 预警设置 -->
                <div class="settings-section">
                    <h3 class="section-title">预警阈值设置</h3>
                    
                    <div class="form-group">
                        <label class="form-label">矿压预警阈值 (MPa)</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="pressure-threshold" class="checkbox-input" checked>
                                一级阈值: 20.0 MPa
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="pressure-threshold" class="checkbox-input">
                                二级阈值: 22.5 MPa
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="pressure-threshold" class="checkbox-input">
                                三级阈值: 25.0 MPa
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">瓦斯浓度阈值 (%)</label>
                        <input type="range" class="form-control" min="0.5" max="1.5" step="0.1" value="1.0">
                        <div class="form-help">当前值: <span id="gas-threshold">1.0%</span></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">温度异常阈值 (°C)</label>
                        <input type="number" class="form-control" value="35" min="20" max="50">
                        <div class="form-help">超过此温度将触发预警</div>
                    </div>
                </div>
                
                <!-- 保存按钮 -->
                <div class="settings-actions">
                    <button class="settings-btn btn-save">
                        <i class="fas fa-save"></i> 保存设置
                    </button>
                    <button class="settings-btn btn-reset">
                        <i class="fas fa-undo"></i> 恢复默认
                    </button>
                    <button class="settings-btn btn-test">
                        <i class="fas fa-vial"></i> 测试设置
                    </button>
                </div>
            </div>
        </div>
        
        <a href="rsbim_coal_dashboard_full.html" class="back-button">
            <i class="fas fa-arrow-left"></i> 返回仪表板
        </a>
    </main>
    
    <script>
        // 更新时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('current-time').textContent = timeStr;
        }
        
        // 瓦斯阈值滑块
        const gasSlider = document.querySelector('input[type="range"]');
        const gasValue = document.getElementById('gas-threshold');
        
        if (gasSlider) {
            gasSlider.addEventListener('input', function() {
                gasValue.textContent = this.value + '%';
            });
        }
        
        // 设置保存功能
        function setupSettingsActions() {
            // 保存设置
            document.querySelector('.btn-save').addEventListener('click', function() {
                alert('设置已保存！');
            });
            
            // 恢复默认
            document.querySelector('.btn-reset').addEventListener('click', function() {
                if (confirm('确定要恢复默认设置吗？所有自定义设置将被重置。')) {
                    alert('设置已恢复为默认值');
                }
            });
            
            // 测试设置
            document.querySelector('.btn-test').addEventListener('click', function() {
                alert('测试连接成功！所有设置均正常。');
            });
            
            // 设置导航
            document.querySelectorAll('.settings-nav-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('.settings-nav-item').forEach(i => {
                        i.classList.remove('active');
                    });
                    this.classList.add('active');
                    alert('切换到' + this.textContent.trim());
                });
            });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setupSettingsActions();
            setInterval(updateTime, 60000);
        });
    </script>
</body>
</html>
