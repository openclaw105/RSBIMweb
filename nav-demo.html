<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航栏演示</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0e27, #0d1b2a 50%, #1a1f3a);
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        /* 导航栏 */
        .page-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 20px;
            background: linear-gradient(135deg, #0a1428 0%, #0d1f44 40%, #0a1830 100%);
            border-bottom: 3px solid #00d4ff;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 58px;
            box-shadow: 0 4px 20px rgba(0,100,255,.15), 0 0 60px rgba(0,150,255,.08), inset 0 -2px 15px rgba(0,200,255,.1);
        }
        
        /* 顶部霓虹光效 */
        .page-nav::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, rgba(0,212,255,0) 0%, rgba(0,212,255,.8) 20%, rgba(0,255,170,.8) 50%, rgba(0,136,255,.8) 80%, rgba(0,212,255,0) 100%);
            filter: blur(1px);
            animation: neon-pulse 2s ease-in-out infinite;
        }
        
        @keyframes neon-pulse {
            0%, 100% { opacity: .7; filter: blur(1px); }
            50% { opacity: 1; filter: blur(0px); }
        }
        
        /* 底部扫描线 */
        .page-nav::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,.6), rgba(0,255,170,.8), rgba(0,212,255,.6), transparent);
            animation: scan-line 3s linear infinite;
        }
        
        @keyframes scan-line {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        /* 导航按钮 */
        .page-btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: linear-gradient(180deg, rgba(0,60,120,.5) 0%, rgba(0,30,80,.6) 100%);
            border: 1px solid rgba(0,180,255,.25);
            border-radius: 6px;
            color: #7ec8e8;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .3s cubic-bezier(.4,0,.2,1);
            overflow: hidden;
            text-shadow: 0 0 10px rgba(0,180,255,.3);
        }
        
        /* 按钮左侧光条 */
        .page-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, #00d4ff, #00ffaa);
            opacity: 0;
            transition: all .3s;
            border-radius: 0 2px 2px 0;
        }
        
        /* 悬停效果 */
        .page-btn:hover {
            background: linear-gradient(180deg, rgba(0,100,180,.6) 0%, rgba(0,50,120,.7) 100%);
            border-color: rgba(0,212,255,.5);
            color: #fff;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,150,255,.35), 0 0 40px rgba(0,180,255,.15), inset 0 0 20px rgba(0,200,255,.1);
            text-shadow: 0 0 15px rgba(0,200,255,.8);
        }
        
        .page-btn:hover::before {
            opacity: 1;
            box-shadow: 0 0 15px rgba(0,212,255,.8);
        }
        
        /* 激活状态 */
        .page-btn.active {
            background: linear-gradient(180deg, rgba(0,140,220,.7) 0%, rgba(0,80,160,.8) 100%);
            border-color: #00d4ff;
            color: #fff;
            font-weight: 600;
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(0,200,255,.5), 0 0 60px rgba(0,180,255,.2), inset 0 0 25px rgba(0,200,255,.15);
            text-shadow: 0 0 20px rgba(0,220,255,1);
            animation: active-glow 1.5s ease-in-out infinite;
        }
        
        .page-btn.active::before {
            opacity: 1;
            width: 4px;
            background: linear-gradient(180deg, #00ffaa, #00d4ff);
            box-shadow: 0 0 20px rgba(0,255,170,.9);
        }
        
        @keyframes active-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(0,200,255,.5), 0 0 60px rgba(0,180,255,.2); }
            50% { box-shadow: 0 0 40px rgba(0,200,255,.7), 0 0 80px rgba(0,180,255,.3); }
        }
        
        /* 激活状态底部指示器 */
        .page-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffaa, #00d4ff, transparent);
            border-radius: 2px;
            box-shadow: 0 0 10px rgba(0,255,170,.8);
        }
        
        /* 图标样式 */
        .page-btn .nav-icon {
            font-size: 16px;
            filter: drop-shadow(0 0 5px rgba(0,200,255,.5));
            transition: all .3s;
        }
        
        .page-btn:hover .nav-icon {
            transform: scale(1.15);
            filter: drop-shadow(0 0 10px rgba(0,200,255,.8));
        }
        
        .page-btn.active .nav-icon {
            filter: drop-shadow(0 0 8px rgba(0,255,170,.8));
        }
        
        /* 内容区 */
        .content {
            padding: 40px;
            color: #fff;
        }
        
        .content h1 {
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0,212,255,.5);
        }
        
        .tip {
            background: rgba(0,212,255,.1);
            border: 1px solid rgba(0,212,255,.3);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .tip h3 {
            color: #00ffaa;
            margin-top: 0;
        }
        
        .tip ul {
            color: #8ec8e8;
        }
    </style>
</head>
<body>
    <div class="page-nav">
        <button class="page-btn active">
            <span class="nav-icon">🏠</span>首页
        </button>
        <button class="page-btn" onclick="alert('趋势监测')">
            <span class="nav-icon">📊</span>趋势监测
        </button>
        <button class="page-btn" onclick="alert('传感器运维')">
            <span class="nav-icon">📡</span>传感器运维
        </button>
        <button class="page-btn" onclick="alert('综合数据')">
            <span class="nav-icon">📋</span>综合数据
        </button>
    </div>
    
    <div class="content">
        <h1>🎨 科技感导航栏演示</h1>
        <p>这是全新设计的导航栏效果预览，请用浏览器打开此文件查看。</p>
        
        <div class="tip">
            <h3>✨ 特效说明</h3>
            <ul>
                <li>🔵 顶部霓虹光条 - 呼吸闪烁动画</li>
                <li>💫 底部扫描线 - 光效流动动画</li>
                <li>🔘 左侧光条 - 悬停时显示</li>
                <li>⬆️ 上浮+发光 - 鼠标悬停效果</li>
                <li>💎 脉冲发光 - 激活状态持续动画</li>
                <li>📱 图标缩放 - 悬停时图标放大</li>
            </ul>
        </div>
    </div>
</body>
</html>
