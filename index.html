<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSBIM 光感智能安全监测预警平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        :root {
            --primary-color: #00f0ff;
            --secondary-color: #00ff88;
            --accent-color: #ff6b35;
            --warning-color: #ffaa00;
            --danger-color: #ff3366;
            --bg-dark: #0a0e17;
            --bg-panel: rgba(10, 20, 40, 0.85);
            --border-glow: rgba(0, 240, 255, 0.3);
            --text-primary: #e0f4ff;
            --text-secondary: #8ba3c7;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        
        .dashboard-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 10px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
        }
        
        .logo { display: flex; align-items: center; gap: 15px; }
        
        .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--primary-color);
        }
        
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-right { display: flex; align-items: center; gap: 20px; }
        
        .time-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--primary-color);
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--secondary-color);
            border-radius: 20px;
        }
        
        .status-dot {
            width: 10px; height: 10px;
            background: var(--secondary-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px var(--secondary-color); }
            50% { box-shadow: 0 0 20px var(--secondary-color); }
        }
        
        .business-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .tab-btn {
            padding: 12px 30px;
            background: var(--bg-panel);
            border: 2px solid var(--border-glow);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .tab-btn:hover::before { left: 100%; }
        
        .tab-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 255, 136, 0.2));
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
        }
        
        .tab-btn i { font-size: 18px; }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            flex: 1;
        }
        
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .panel:hover { box-shadow: 0 0 40px rgba(0, 240, 255, 0.2); }
        
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .panel-title i { font-size: 18px; }
        
        .left-panel { display: flex; flex-direction: column; gap: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .stat-card {
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.2);
        }
        
        .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-card:nth-child(1) .stat-icon { color: var(--primary-color); }
        .stat-card:nth-child(2) .stat-icon { color: var(--secondary-color); }
        .stat-card:nth-child(3) .stat-icon { color: var(--warning-color); }
        .stat-card:nth-child(4) .stat-icon { color: var(--danger-color); }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }
        
        .warning-list { max-height: 280px; overflow-y: auto; }
        
        .warning-item {
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255, 51, 102, 0.1);
            border-left: 3px solid var(--danger-color);
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        .warning-item.warning-low {
            background: rgba(255, 170, 0, 0.1);
            border-left-color: var(--warning-color);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .warning-icon { font-size: 20px; color: var(--danger-color); }
        .warning-low .warning-icon { color: var(--warning-color); }
        .warning-content { flex: 1; }
        .warning-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .warning-time { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
        
        .center-panel { display: flex; flex-direction: column; gap: 20px; }
        
        .map-container { flex: 1; min-height: 400px; position: relative; }
        #map-chart { width: 100%; height: 100%; }
        
        .map-legend {
            position: absolute;
            bottom: 20px; left: 20px;
            background: var(--bg-panel);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-glow);
        }
        
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
        
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-dot.type1 { background: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); }
        .legend-dot.type2 { background: var(--secondary-color); box-shadow: 0 0 10px var(--secondary-color); }
        .legend-dot.type3 { background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }
        
        .bottom-panel {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .chart-container { height: 250px; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        
        #cloud-chart { width: 100%; height: 180px; }
        #pointcloud-chart { width: 100%; height: 200px; }
        
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        
        .data-table th {
            padding: 10px;
            text-align: left;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-glow);
            font-weight: 500;
        }
        
        .data-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }
        
        .data-table tr:hover td { background: rgba(0, 240, 255, 0.05); }
        
        .status-tag { padding: 3px 8px; border-radius: 10px; font-size: 11px; }
        .status-tag.normal { background: rgba(0, 255, 136, 0.2); color: var(--secondary-color); }
        .status-tag.warning { background: rgba(255, 170, 0, 0.2); color: var(--warning-color); }
        .status-tag.danger { background: rgba(255, 51, 102, 0.2); color: var(--danger-color); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 3px; }
        
        @media (max-width: 1400px) {
            .bottom-panel { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; }
            .bottom-panel { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; }
            .business-tabs { flex-wrap: wrap; }
        }
        
        @keyframes glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .glow-text { animation: glow 2s infinite; }
    </style>
</head>

        let mapChart, cloudChart, pointCloudChart, trendChart, stressChart, sensorChart, alarmChart;

        const monitorPoints = {

                { name: '三峡库区边坡', value: [110.5, 31.0], safety: 85 },
                { name: '黄河河堤', value: [112.0, 34.8], safety: 72 },

                { name: '四川边坡', value: [104.0, 30.5], safety: 76 },
                { name: '湖南边坡', value: [112.0, 28.2], safety: 63 }
            ],
            chemical: [
                { name: '乙烯储罐区', value: [116.4, 39.9], safety: 90 },
                { name: '炼油厂区', value: [121.5, 31.2], safety: 78 },
                { name: '化工园区A', value: [120.6, 31.3], safety: 65 },
                { name: '管道01段', value: [115.0, 38.0], safety: 52 },
                { name: '管道02段', value: [118.0, 36.0], safety: 48 },

                { title: '黄河河堤沉降异常', time: '2026-03-17 14:10:45', level: 'warning' },
                { title: '丹江口水库大坝渗压偏高', time: '2026-03-17 14:08:12', level: 'warning' },

            ],

            ]

        document.addEventListener('DOMContentLoaded', function() {
            initParticles();
            initTime();
            setTimeout(initCharts, 100);
            updateWarningList();

            window.addEventListener('resize', handleResize);
        });
        
        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x, dy = p1.y - p2.y, dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(0, 240, 255, ${0.1 * (1 - dist / 150)})`;
                            ctx.stroke();
                        }
                    });
                    p1.x += p1.vx; p1.y += p1.vy;
                    if (p1.x < 0 || p1.x > canvas.width) p1.vx *= -1;
                    if (p1.y < 0 || p1.y > canvas.height) p1.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p1.x, p1.y, p1.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 240, 255, ${p1.opacity})`;
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        }
        
        function initTime() {
            function updateTime() {
                const now = new Date();
                const s = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                document.getElementById('time-text').textContent = s;
            }
            updateTime();
            setInterval(updateTime, 1000);
        }
        
        function initCharts() {
            initMapChart();
            initCloudChart();
            initPointCloudChart();
            initTrendChart();
            initStressChart();
            initSensorChart();
            initAlarmChart();
        }
        
        function initMapChart() {
            mapChart = echarts.init(document.getElementById('map-chart'));
            const option = {
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                geo: {
                    map: 'china', roam: true, label: { show: false },
                    itemStyle: { areaColor: 'rgba(0, 240, 255, 0.08)', borderColor: 'rgba(0, 240, 255, 0.3)', borderWidth: 1 },
                    emphasis: { itemStyle: { areaColor: 'rgba(0, 240, 255, 0.2)' } }
                },
                series: [{
                    name: '监测点', type: 'effectScatter', coordinateSystem: 'geo',
                    data: monitorPoints[currentTab].map(item => ({ name: item.name, value: [...item.value, item.safety] })),
                    symbolSize: val => Math.max(10, val[2] / 6),
                    showEffectOn: 'render', rippleEffect: { brushType: 'stroke', scale: 3 },
                    itemStyle: { color: businessData[currentTab].color, shadowBlur: 15, shadowColor: businessData[currentTab].color }
                }]
            };
            fetch('https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js').then(() => mapChart.setOption(option)).catch(() => mapChart.setOption(option));
        }
        
        function initCloudChart() {
            cloudChart = echarts.init(document.getElementById('cloud-chart'));
            cloudChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                radar: {
                    indicator: [{ name: '位移', max: 100 }, { name: '沉降', max: 100 }, { name: '倾斜', max: 100 }, { name: '裂缝', max: 100 }, { name: '应力', max: 100 }, { name: '振动', max: 100 }],
                    shape: 'circle', splitNumber: 4, axisName: { color: '#00f0ff', fontSize: 11 },
                    splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } },
                    splitArea: { show: true, areaStyle: { color: ['rgba(0, 240, 255, 0.02)', 'rgba(0, 240, 255, 0.05)'] } }
                },
                series: [{ type: 'radar', data: [{ value: [85, 72, 68, 55, 78, 62], name: '综合监测指数', areaStyle: { color: 'rgba(0, 240, 255, 0.3)' }, lineStyle: { color: '#00f0ff', width: 2 }, itemStyle: { color: '#00f0ff' } }] }]
            });
        }
        
        function initPointCloudChart() {
            pointCloudChart = echarts.init(document.getElementById('pointcloud-chart'));
            pointCloudChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                grid: { left: '12%', right: '8%', top: '15%', bottom: '20%' },
                xAxis: { type: 'category', data: ['1月', '2月', '3月', '4月', '5月', '6月'], axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7', fontSize: 10 } },
                yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' }, splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.1)' } } },
                series: [{ type: 'scatter', symbolSize: 15, data: [[0, 85], [1, 78], [2, 92], [3, 68], [4, 75], [5, 88]], itemStyle: { color: '#00f0ff', shadowBlur: 10, shadowColor: '#00f0ff' } }]
            });
        }
        
        function initTrendChart() {
            trendChart = echarts.init(document.getElementById('trend-chart'));
            trendChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                grid: { left: '12%', right: '8%', top: '15%', bottom: '20%' },
                xAxis: { type: 'category', data: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'], axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' } },
                yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' }, splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.1)' } } },
                series: [{ type: 'line', data: [12, 15, 18, 25, 22, 20], smooth: true, areaStyle: { color: 'rgba(0, 240, 255, 0.2)' }, lineStyle: { color: '#00f0ff', width: 2 }, itemStyle: { color: '#00f0ff' } }]
            });
        }
        
        function initStressChart() {
            stressChart = echarts.init(document.getElementById('stress-chart'));
            stressChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                grid: { left: '12%', right: '8%', top: '15%', bottom: '20%' },
                xAxis: { type: 'category', data: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'], axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' } },
                yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' }, splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.1)' } } },
                series: [{ type: 'line', data: [45, 52, 48, 60, 55, 58], smooth: true, areaStyle: { color: 'rgba(0, 255, 136, 0.2)' }, lineStyle: { color: '#00ff88', width: 2 }, itemStyle: { color: '#00ff88' } }]
            });
        }
        
        function initSensorChart() {
            sensorChart = echarts.init(document.getElementById('sensor-chart'));
            sensorChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                grid: { left: '12%', right: '8%', top: '15%', bottom: '20%' },
                xAxis: { type: 'category', data: ['位移', '沉降', '倾斜', '裂缝', '应力', '振动'], axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7', fontSize: 10 } },
                yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' }, splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.1)' } } },
                series: [{ type: 'bar', data: [85, 72, 68, 55, 78, 62], itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: '#00f0ff' }, { offset: 1, color: '#00ff88' }] }, borderRadius: [5, 5, 0, 0] } }]
            });
        }
        
        function initAlarmChart() {
            alarmChart = echarts.init(document.getElementById('alarm-chart'));
            alarmChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                series: [{
                    type: 'pie',
                    radius: ['45%', '70%'],
                    center: ['50%', '50%'],
                    avoidLabelOverlap: false,
                    label: { show: false },
                    data: [
                        { value: 335, name: '位移报警', itemStyle: { color: '#ff3366' } },
                        { value: 234, name: '沉降报警', itemStyle: { color: '#ffaa00' } },
                        { value: 154, name: '应力报警', itemStyle: { color: '#00ff88' } },
                        { value: 135, name: '振动报警', itemStyle: { color: '#00f0ff' } },
                        { value: 148, name: '温度报警', itemStyle: { color: '#ff6b35' } }
                    ]
                }]
            });
        }
        
        function updateWarningList() {
            const warningList = document.getElementById('warning-list');
            const warnings = warningData[currentTab] || [];
            warningList.innerHTML = warnings.map(w => `
                <div class="warning-item ${w.level === 'warning' ? 'warning-low' : ''}">
                    <i class="fas fa-exclamation-triangle warning-icon"></i>
                    <div class="warning-content">
                        <div class="warning-title">${w.title}</div>
                        <div class="warning-time">${w.time}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function updateDataTable() {
            const tableBody = document.getElementById('data-table-body');
            const points = monitorPoints[currentTab] || [];
            tableBody.innerHTML = points.slice(0, 6).map(p => {
                let status = 'normal', statusText = '正常';
                if (p.safety < 50) { status = 'danger'; statusText = '告警'; }
                else if (p.safety < 70) { status = 'warning'; statusText = '预警'; }
                return `<tr>
                    <td>${p.name}</td>
                    <td><span class="status-tag ${status}">${statusText}</span></td>
                    <td>${p.safety}</td>
                </tr>`;
            }).join('');
        }
        
        function switchTab(type) {
            currentTab = type;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            
            // 更新统计卡片
            const stats = {
                geology: { monitor: '1,286', warning: '12', normal: '1,268', dataRate: '98.6%' },
                chemical: { monitor: '856', warning: '8', normal: '845', dataRate: '99.1%' },
                mine: { monitor: '428', warning: '5', normal: '420', dataRate: '97.8%' }
            };
            const s = stats[type];
            document.getElementById('monitor-count').textContent = s.monitor;
            document.getElementById('warning-count').textContent = s.warning;
            document.getElementById('normal-count').textContent = s.normal;
            document.getElementById('data-count').textContent = s.dataRate;
            
            updateWarningList();
            updateDataTable();
            
            // 更新地图
            if (mapChart) {
                mapChart.setOption({
                    series: [{
                        data: monitorPoints[currentTab].map(item => ({ name: item.name, value: [...item.value, item.safety] })),
                        itemStyle: { color: businessData[currentTab].color, shadowColor: businessData[currentTab].color }
                    }]
                });
            }
            
            // 更新云图颜色
            if (cloudChart) {
                cloudChart.setOption({
                    series: [{
                        data: [{ value: [85, 72, 68, 55, 78, 62], name: '综合监测指数', areaStyle: { color: businessData[currentTab].color + '40' }, lineStyle: { color: businessData[currentTab].color }, itemStyle: { color: businessData[currentTab].color } }]
                    }]
                });
            }
        }
        
        function handleResize() {
            [mapChart, cloudChart, pointCloudChart, trendChart, stressChart, sensorChart, alarmChart].forEach(chart => {
                if (chart) chart.resize();
            });
        }
    </script>
</body>
</html>
