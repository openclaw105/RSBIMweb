<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSBIM 光感智能安全监测预警平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        :root {
            --primary-color: #00f0ff;
            --secondary-color: #00ff88;
            --accent-color: #ff6b35;
            --warning-color: #ffaa00;
            --danger-color: #ff3366;
            --bg-dark: #050810;
            --bg-panel: rgba(8, 15, 28, 0.92);
            --border-glow: rgba(0, 240, 255, 0.25);
            --text-primary: #d0e8ff;
            --text-secondary: #6a8bb8;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        
        /* Add grid background to body */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }
        
        .dashboard-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 30px rgba(0, 240, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            position: relative;
        }
        
        /* Header glow line */
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            opacity: 0.5;
        }
        
        .logo { display: flex; align-items: center; gap: 15px; }
        
        .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--primary-color);
        }
        
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-right { display: flex; align-items: center; gap: 20px; }
        
        .time-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--primary-color);
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--secondary-color);
            border-radius: 20px;
        }
        
        .status-dot {
            width: 10px; height: 10px;
            background: var(--secondary-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px var(--secondary-color); }
            50% { box-shadow: 0 0 20px var(--secondary-color); }
        }
        
        .business-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            justify-content: center;
        }
        
        .tab-btn {
            padding: 10px 25px;
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .tab-btn:hover::before { left: 100%; }
        
        .tab-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 255, 136, 0.2));
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
        }
        
        .tab-btn i { font-size: 18px; }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 15px;
            flex: 1;
            min-height: 0; /* 防止 flex 溢出 */
            overflow: hidden;
        }
        
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 20px rgba(0, 240, 255, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        /* Corner accents */
        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            border-top: 2px solid var(--primary-color);
            border-left: 2px solid var(--primary-color);
            opacity: 0.5;
        }
        
        .panel::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            border-bottom: 2px solid var(--primary-color);
            border-right: 2px solid var(--primary-color);
            opacity: 0.5;
        }
        
        .panel:hover { 
            box-shadow: 
                0 0 40px rgba(0, 240, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 240, 255, 0.4);
        }
        
        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .panel-title i { font-size: 14px; }
        
        /* Title glow effect */
        .panel-title::before {
            content: '◆';
            font-size: 8px;
            opacity: 0.7;
        }
        
        .left-panel { display: flex; flex-direction: column; gap: 15px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .stat-card {
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 4px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.2);
        }
        
        .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-card:nth-child(1) .stat-icon { color: var(--primary-color); }
        .stat-card:nth-child(2) .stat-icon { color: var(--secondary-color); }
        .stat-card:nth-child(3) .stat-icon { color: var(--warning-color); }
        .stat-card:nth-child(4) .stat-icon { color: var(--danger-color); }
        
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .warning-list { max-height: 220px; overflow-y: auto; }
        
        .warning-item {
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255, 51, 102, 0.1);
            border-left: 3px solid var(--danger-color);
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        .warning-item.warning-low {
            background: rgba(255, 170, 0, 0.1);
            border-left-color: var(--warning-color);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .warning-icon { font-size: 20px; color: var(--danger-color); }
        .warning-low .warning-icon { color: var(--warning-color); }
        .warning-content { flex: 1; }
        .warning-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .warning-time { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
        
        .center-panel { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            min-height: 0;
        }
        
        .center-panel .panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        
        .map-container { 
            flex: 1;
            height: auto;
            min-height: 200px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(0, 240, 255, 0.03) 0%, rgba(0, 102, 255, 0.05) 100%);
        }
        
        /* Sci-fi scan line effect */
        .map-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 240, 255, 0.015) 2px,
                rgba(0, 240, 255, 0.015) 4px
            );
            pointer-events: none;
            z-index: 10;
        }
        
        /* Animated scan line */
        @keyframes scanline {
            0% { top: -100%; }
            100% { top: 100%; }
        }
        
        .map-container::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 100px;
            background: linear-gradient(180deg, rgba(0, 240, 255, 0) 0%, rgba(0, 240, 255, 0.08) 50%, rgba(0, 240, 255, 0) 100%);
            animation: scanline 4s linear infinite;
            pointer-events: none;
            z-index: 11;
        }
        #map-chart { width: 100%; height: 100%; }
        
        .map-legend {
            position: absolute;
            bottom: 15px; left: 15px;
            background: rgba(8, 15, 28, 0.9);
            padding: 12px;
            border-radius: 4px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
        
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-dot.type1 { background: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); }
        .legend-dot.type2 { background: var(--secondary-color); box-shadow: 0 0 10px var(--secondary-color); }
        .legend-dot.type3 { background: var(--accent-color); box-shadow: 0 0 10px var(--accent-color); }
        
        .bottom-panel {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: auto; /* 改为 auto 自动填充 */
            min-height: 200px;
        }
        
        .chart-container { height: 180px; }
        .right-panel { display: flex; flex-direction: column; gap: 15px; }
        
        #cloud-chart { width: 100%; height: 180px; }
        #pointcloud-chart { width: 100%; height: 200px; }
        
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        
        .data-table th {
            padding: 10px;
            text-align: left;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-glow);
            font-weight: 500;
        }
        
        .data-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }
        
        .data-table tr:hover td { background: rgba(0, 240, 255, 0.05); }
        
        .status-tag { padding: 3px 8px; border-radius: 10px; font-size: 11px; }
        .status-tag.normal { background: rgba(0, 255, 136, 0.2); color: var(--secondary-color); }
        .status-tag.warning { background: rgba(255, 170, 0, 0.2); color: var(--warning-color); }
        .status-tag.danger { background: rgba(255, 51, 102, 0.2); color: var(--danger-color); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 3px; }
        
        @media (max-width: 1600px) {
            .main-content { grid-template-columns: 260px 1fr 260px; }
            .bottom-panel { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 1400px) {
            .main-content { grid-template-columns: 240px 1fr 240px; }
            .bottom-panel { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 1200px) {
            .main-content { grid-template-columns: 1fr; }
            .center-panel { order: -1; }
            .bottom-panel { grid-template-columns: repeat(2, 1fr); }
            .header { flex-direction: column; gap: 12px; }
            .business-tabs { flex-wrap: wrap; }
            .map-container { min-height: 350px; }
        }
        
        @media (max-width: 768px) {
            .bottom-panel { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .chart-container { height: 200px; }
            .logo-text { font-size: 18px; }
        }
        
        @keyframes glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .glow-text { animation: glow 2s infinite; }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-radar"></i></div>
                <div class="logo-text">RSBIM 光感智能安全监测预警平台</div>
            </div>
            <div class="header-right">
                <div class="time-display">
                    <i class="fas fa-clock"></i>
                    <span id="time-text"></span>
                </div>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>系统运行正常</span>
                </div>
            </div>
        </header>
        
        <div class="business-tabs">
            <button class="tab-btn active" data-type="geology" onclick="switchTab('geology')">
                <i class="fas fa-mountain"></i>地质监测
            </button>
            <button class="tab-btn" data-type="chemical" onclick="switchTab('chemical')">
                <i class="fas fa-industry"></i>化工安全
            </button>
            <button class="tab-btn" data-type="mine" onclick="switchTab('mine')">
                <i class="fas fa-hammer"></i>煤矿监测
            </button>
        </div>
        
        <div class="main-content">
            <div class="left-panel">
                <div class="panel">
                    <div class="panel-title">
                        <i class="fas fa-chart-bar"></i>实时监测概况
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-broadcast-tower"></i></div>
                            <div class="stat-value" id="monitor-count">1,286</div>
                            <div class="stat-label">监测点位</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                            <div class="stat-value" id="warning-count">12</div>
                            <div class="stat-label">预警数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                            <div class="stat-value" id="normal-count">1,268</div>
                            <div class="stat-label">正常运行</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                            <div class="stat-value" id="data-count">98.6%</div>
                            <div class="stat-label">数据完好率</div>
                        </div>
                    </div>
                </div>
                
                <div class="panel">
                    <div class="panel-title">
                        <i class="fas fa-bell"></i>实时预警
                    </div>
                    <div class="warning-list" id="warning-list"></div>
                </div>
            </div>
            
            <div class="center-panel">
                <div class="panel" style="flex:1; border-color: rgba(0, 240, 255, 0.35); display: flex; flex-direction: column;">
                    <div class="panel-title">
                        <i class="fas fa-map-marked-alt"></i>全国监测点分布
                        <span class="glow-text" style="margin-left:auto;font-size:11px;color:var(--secondary-color);">
                            <i class="fas fa-circle" style="font-size:6px;"></i> 实时更新
                        </span>
                    </div>
                    <div class="map-container" style="border: 1px solid rgba(0, 240, 255, 0.15); border-radius: 4px;">
                        <canvas id="map-canvas"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="right-panel">
                <div class="panel">
                    <div class="panel-title"><i class="fas fa-cloud"></i>监测云图</div>
                    <div id="cloud-chart"></div>
                </div>
                
                <div class="panel">
                    <div class="panel-title"><i class="fas fa-cube"></i>点云分布</div>
                    <div id="pointcloud-chart"></div>
                </div>
                
                <div class="panel">
                    <div class="panel-title"><i class="fas fa-table"></i>实时数据报表</div>
                    <div style="max-height: 200px; overflow-y: auto;">
                        <table class="data-table">
                            <thead><tr><th>监测点</th><th>状态</th><th>值</th></tr></thead>
                            <tbody id="data-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bottom-panel">
            <div class="panel">
                <div class="panel-title"><i class="fas fa-chart-line"></i>位移趋势</div>
                <div class="chart-container" id="trend-chart"></div>
            </div>
            <div class="panel">
                <div class="panel-title"><i class="fas fa-wave-square"></i>应力变化</div>
                <div class="chart-container" id="stress-chart"></div>
            </div>
            <div class="panel">
                <div class="panel-title"><i class="fas fa-microchip"></i>传感器状态</div>
                <div class="chart-container" id="sensor-chart"></div>
            </div>
            <div class="panel">
                <div class="panel-title"><i class="fas fa-chart-pie"></i>报警统计</div>
                <div class="chart-container" id="alarm-chart"></div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'geology';
        let mapCanvas, mapCtx;
        let animationId;
        let ripplePoints = [];
        
        const businessData = {
            geology: { name: '地质监测', items: ['边坡监测', '河堤监测', '水坝监测'], color: '#00f0ff', icon: 'fa-mountain' },
            chemical: { name: '化工安全', items: ['储罐群', '管道监测'], color: '#00ff88', icon: 'fa-industry' },

        };
        
        const monitorPoints = {
            geology: [

            chemical: [
                { name: '乙烯储罐区', value: [116.4, 39.9], safety: 90 },
                { name: '炼油厂区', value: [121.5, 31.2], safety: 78 },
                { name: '化工园区A', value: [120.6, 31.3], safety: 65 },
                { name: '管道01段', value: [115.0, 38.0], safety: 52 },
                { name: '管道02段', value: [118.0, 36.0], safety: 48 },
                { name: '储罐群B', value: [122.0, 30.5], safety: 71 }
            ],
            mine: [
                { name: '露天矿A', value: [109.5, 40.0], safety: 88 },
                { name: '露天矿B', value: [110.0, 39.5], safety: 75 },
                { name: '井工矿C', value: [113.5, 37.8], safety: 92 },

                { name: '边坡监测点', value: [108.5, 40.5], safety: 58 }

        };
        
        const warningData = {

        function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
            
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p1, i) => {
                    particles.slice(i + 1).forEach(p2 => {
                        const dx = p1.x - p2.x, dy = p1.y - p2.y, dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(0, 240, 255, ${0.1 * (1 - dist / 150)})`;
                            ctx.stroke();
                        }
                    });
                    p1.x += p1.vx; p1.y += p1.vy;
                    if (p1.x < 0 || p1.x > canvas.width) p1.vx *= -1;
                    if (p1.y < 0 || p1.y > canvas.height) p1.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p1.x, p1.y, p1.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 240, 255, ${p1.opacity})`;
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        }

                    mapCtx.beginPath();
                    mapCtx.moveTo(step[0].x, step[0].y);
                    step.forEach(p => mapCtx.lineTo(p.x, p.y));
                    mapCtx.closePath();
                    mapCtx.strokeStyle = color;
                    mapCtx.lineWidth = lineWidth;
                    mapCtx.shadowColor = color;
                    mapCtx.shadowBlur = 12;
                    mapCtx.stroke();
                    mapCtx.shadowBlur = 0;
                });
                
                // 绘制扫描线效果（雷达扫描）
                scanAngle += scanSpeed;
                const scanRadius = Math.min(w, h) * 0.45;
                
                // 扫描渐变
                const scanGradient = mapCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, scanRadius);
                scanGradient.addColorStop(0, 'rgba(0, 240, 255, 0)');
                scanGradient.addColorStop(0.9, 'rgba(0, 240, 255, 0)');
                scanGradient.addColorStop(1, 'rgba(0, 240, 255, 0.1)');
                
                mapCtx.save();
                mapCtx.translate(centerX, centerY);
                mapCtx.rotate(scanAngle);
                mapCtx.beginPath();
                mapCtx.arc(0, 0, scanRadius, 0, Math.PI * 2);
                mapCtx.fillStyle = scanGradient;
                mapCtx.fill();
                
                // 扫描线
                mapCtx.beginPath();
                mapCtx.moveTo(0, 0);
                mapCtx.lineTo(scanRadius, 0);
                mapCtx.lineTo(scanRadius, 3);
                mapCtx.lineTo(0, 0);
                mapCtx.fillStyle = 'rgba(0, 240, 255, 0.3)';
                mapCtx.fill();
                mapCtx.restore();
                
                // 绘制同心圆网格（军事坐标风格）
                for (let r = 50; r < scanRadius; r += 60) {
                    mapCtx.beginPath();
                    mapCtx.arc(centerX, centerY, r, 0, Math.PI * 2);
                    mapCtx.strokeStyle = `rgba(0, 240, 255, ${0.1 - r/scanRadius * 0.08})`;
                    mapCtx.lineWidth = 1;
                    mapCtx.setLineDash([5, 10]);
                    mapCtx.stroke();
                    mapCtx.setLineDash([]);
                }
                
                // 绘制放射线
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 6) {
                    mapCtx.beginPath();
                    mapCtx.moveTo(centerX, centerY);
                    mapCtx.lineTo(centerX + Math.cos(a) * scanRadius, centerY + Math.sin(a) * scanRadius);
                    mapCtx.strokeStyle = 'rgba(0, 240, 255, 0.1)';
                    mapCtx.lineWidth = 1;
                    mapCtx.setLineDash([2, 8]);
                    mapCtx.stroke();
                    mapCtx.setLineDash([]);
                }
                
                // 绘制监测点
                pulseTime += 0.05;
                
                monitorPoints.forEach((pt, idx) => {
                    // 脉冲动画
                    const pulseRadius = 15 + Math.sin(pulseTime + idx) * 8;
                    const pulseAlpha = 0.3 + Math.sin(pulseTime + idx) * 0.2;
                    
                    // 脉冲光圈
                    mapCtx.beginPath();
                    mapCtx.arc(pt.x, pt.y, pulseRadius, 0, Math.PI * 2);
                    mapCtx.strokeStyle = pt.status === 'warning' ? 
                        `rgba(255, 170, 0, ${pulseAlpha})` : 
                        `rgba(0, 240, 255, ${pulseAlpha})`;
                    mapCtx.lineWidth = 2;
                    mapCtx.stroke();
                    
                    // 外圈涟漪
                    if (Math.random() < 0.01) {
                        ripplePoints.push({
                            x: pt.x, y: pt.y, r: 8, alpha: 1,
                            color: pt.status === 'warning' ? accentColor : color
                        });
                    }
                    
                    // 涟漪动画
                    ripplePoints.forEach((ripple, i) => {
                        if (ripple.alpha <= 0) {
                            ripplePoints.splice(i, 1);
                            return;
                        }
                        mapCtx.beginPath();
                        mapCtx.arc(ripple.x, ripple.y, ripple.r, 0, Math.PI * 2);
                        mapCtx.strokeStyle = `${ripple.color}${Math.floor(ripple.alpha * 255).toString(16).padStart(2, '0')}`;
                        mapCtx.lineWidth = 2;
                        mapCtx.stroke();
                        ripple.r += 1.2;
                        ripple.alpha -= 0.015;
                    });
                    
                    // 监测点主体
                    mapCtx.beginPath();
                    mapCtx.arc(pt.x, pt.y, 8, 0, Math.PI * 2);
                    mapCtx.fillStyle = pt.status === 'warning' ? accentColor : color;
                    mapCtx.shadowColor = pt.status === 'warning' ? accentColor : color;
                    mapCtx.shadowBlur = 20;
                    mapCtx.fill();
                    mapCtx.shadowBlur = 0;
                    
                    // 内部亮点
                    mapCtx.beginPath();
                    mapCtx.arc(pt.x - 2, pt.y - 2, 3, 0, Math.PI * 2);
                    mapCtx.fillStyle = '#ffffff';
                    mapCtx.fill();
                    
                    // 标签
                    mapCtx.font = 'bold 11px Orbitron';
                    mapCtx.fillStyle = color;
                    mapCtx.textAlign = 'center';
                    mapCtx.fillText(pt.label, pt.x, pt.y - 16);
                    
                    // 数据标签
                    mapCtx.font = '9px Noto Sans SC';
                    mapCtx.fillStyle = pt.status === 'warning' ? 
                        'rgba(255, 107, 53, 0.9)' : 
                        'rgba(0, 240, 255, 0.8)';
                    mapCtx.fillText(`${pt.name}: ${pt.value}`, pt.x, pt.y + 22);
                });
                
                // 绘制边坡角数据面板（科幻UI风格）
                const panelX = w * 0.05;
                const panelY = h * 0.08;
                const panelW = w * 0.16;
                const panelH = h * 0.35;
                
                // 面板背景
                mapCtx.fillStyle = 'rgba(10, 20, 40, 0.85)';
                mapCtx.strokeStyle = color;
                mapCtx.lineWidth = 1;
                mapCtx.beginPath();
                mapCtx.roundRect(panelX, panelY, panelW, panelH, 5);
                mapCtx.fill();
                mapCtx.stroke();
                
                // 面板标题
                mapCtx.font = 'bold 12px Orbitron';
                mapCtx.fillStyle = color;
                mapCtx.textAlign = 'left';
                mapCtx.fillText('边坡监测数据', panelX + 10, panelY + 22);
                
                // 分割线
                mapCtx.beginPath();
                mapCtx.moveTo(panelX + 10, panelY + 30);
                mapCtx.lineTo(panelX + panelW - 10, panelY + 30);
                mapCtx.strokeStyle = 'rgba(0, 240, 255, 0.3)';
                mapCtx.lineWidth = 1;
                mapCtx.stroke();
                
                // 边坡数据
                slopeData.forEach((data, idx) => {
                    const rowY = panelY + 45 + idx * 28;
                    
                    // 标签
                    mapCtx.font = 'bold 10px Orbitron';
                    mapCtx.fillStyle = 'rgba(0, 240, 255, 0.7)';
                    mapCtx.fillText(data.label, panelX + 10, rowY);
                    
                    // 角度
                    mapCtx.font = '10px Noto Sans SC';
                    mapCtx.fillStyle = color;
                    mapCtx.fillText(`角度: ${data.angle}`, panelX + 10, rowY + 12);
                    
                    // 深度
                    mapCtx.fillStyle = 'rgba(0, 240, 255, 0.7)';
                    mapCtx.fillText(`采深: ${data.depth}`, panelX + panelW * 0.45, rowY + 12);
                    
                    // 稳定性进度条
                    const barX = panelX + 10;
                    const barW = panelW - 20;
                    const barH = 4;
                    const barY = rowY + 18;
                    
                    mapCtx.fillStyle = 'rgba(0, 240, 255, 0.2)';
                    mapCtx.fillRect(barX, barY, barW, barH);
                    
                    const stabilityWidth = (data.stability / 100) * barW;
                    const barColor = data.stability > 90 ? '#00ff88' : (data.stability > 80 ? color : '#ffaa00');
                    mapCtx.fillStyle = barColor;
                    mapCtx.fillRect(barX, barY, stabilityWidth, barH);
                });
                
                // 绘制采深标尺（右侧）
                const rulerX = w * 0.93;
                const rulerY = h * 0.15;
                const rulerH = h * 0.7;
                
                // 标尺背景
                mapCtx.fillStyle = 'rgba(10, 20, 40, 0.85)';
                mapCtx.strokeStyle = color;
                mapCtx.lineWidth = 1;
                mapCtx.fillRect(rulerX, rulerY, 30, rulerH);
                mapCtx.strokeRect(rulerX, rulerY, 30, rulerH);
                
                // 标尺刻度
                const depths = ['420m', '400m', '380m', '360m', '340m'];
                depths.forEach((depth, idx) => {
                    const y = rulerY + 20 + idx * (rulerH / (depths.length - 1));
                    
                    // 刻度线
                    mapCtx.beginPath();
                    mapCtx.moveTo(rulerX, y);
                    mapCtx.lineTo(rulerX + 12, y);
                    mapCtx.strokeStyle = color;
                    mapCtx.lineWidth = 2;
                    mapCtx.stroke();
                    
                    // 刻度值
                    mapCtx.font = 'bold 9px Orbitron';
                    mapCtx.fillStyle = color;
                    mapCtx.textAlign = 'left';
                    mapCtx.fillText(depth, rulerX + 16, y + 3);
                });
                
                // 标题
                mapCtx.font = 'bold 18px Orbitron';
                mapCtx.fillStyle = color;
                mapCtx.textAlign = 'center';
                mapCtx.shadowColor = color;
                mapCtx.shadowBlur = 15;
                mapCtx.fillText('露天矿智能监测系统', w * 0.5, h * 0.06);
                mapCtx.shadowBlur = 0;
                
                // 副标题
                mapCtx.font = '11px Noto Sans SC';
                mapCtx.fillStyle = 'rgba(0, 240, 255, 0.6)';
                mapCtx.fillText('实时监测 | 智能预警 | 动态分析', w * 0.5, h * 0.095);
                
                // 底部状态栏
                const statusBarY = h * 0.95;
                mapCtx.font = '10px Orbitron';
                mapCtx.fillStyle = 'rgba(0, 240, 255, 0.7)';
                mapCtx.textAlign = 'left';
                mapCtx.fillText('▸ 监测模式: 连续自动监测', w * 0.05, statusBarY);
                mapCtx.fillText('▸ 数据更新: 实时', w * 0.25, statusBarY);
                mapCtx.fillText('▸ 预警阈值: 已启用', w * 0.45, statusBarY);
                mapCtx.textAlign = 'right';
                mapCtx.fillText('RSBIM v2.0', w * 0.95, statusBarY);
                
                animationId = requestAnimationFrame(animate);
            }
            animate();
        }
        
        // 辅助函数：绘制网格
        function drawGrid(w, h, color, alpha) {
            mapCtx.strokeStyle = `rgba(0, 240, 255, ${alpha})`;
            mapCtx.lineWidth = 1;
            
            const gridSize = 40;
            for (let x = 0; x < w; x += gridSize) {
                mapCtx.beginPath();
                mapCtx.moveTo(x, 0);
                mapCtx.lineTo(x, h);
                mapCtx.stroke();
            }
            for (let y = 0; y < h; y += gridSize) {
                mapCtx.beginPath();
                mapCtx.moveTo(0, y);
                mapCtx.lineTo(w, y);
                mapCtx.stroke();
            }
        }
        
        // 辅助函数：绘制科技感网格
        function drawTechGrid(w, h, color, alpha) {
            mapCtx.strokeStyle = `rgba(0, 240, 255, ${alpha})`;
            mapCtx.lineWidth = 1;
            
            const gridSize = 50;
            
            // 垂直线
            for (let x = gridSize; x < w; x += gridSize) {
                mapCtx.beginPath();
                mapCtx.moveTo(x, 0);
                mapCtx.lineTo(x, h);
                mapCtx.stroke();
            }
            
            // 水平线
            for (let y = gridSize; y < h; y += gridSize) {
                mapCtx.beginPath();
                mapCtx.moveTo(0, y);
                mapCtx.lineTo(w, y);
                mapCtx.stroke();
            }
            
            // 交叉点标记
            mapCtx.fillStyle = `rgba(0, 240, 255, ${alpha * 2})`;
            for (let x = gridSize; x < w; x += gridSize) {
                for (let y = gridSize; y < h; y += gridSize) {
                    mapCtx.beginPath();
                    mapCtx.arc(x, y, 1.5, 0, Math.PI * 2);
                    mapCtx.fill();
                }
            }
        }

                xAxis: { type: 'category', data: ['1月', '2月', '3月', '4月', '5月', '6月'], axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7', fontSize: 10 } },
                yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' }, splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.1)' } } },
                series: [{ type: 'scatter', symbolSize: 15, data: [[0, 85], [1, 78], [2, 92], [3, 68], [4, 75], [5, 88]], itemStyle: { color: '#00f0ff', shadowBlur: 10, shadowColor: '#00f0ff' } }]
            });
        }
        
        function initTrendChart() {
            trendChart = echarts.init(document.getElementById('trend-chart'));
            trendChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                grid: { left: '12%', right: '8%', top: '15%', bottom: '20%' },
                xAxis: { type: 'category', data: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'], axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' } },
                yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' }, splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.1)' } } },
                series: [{ type: 'line', data: [12, 15, 18, 25, 22, 20], smooth: true, areaStyle: { color: 'rgba(0, 240, 255, 0.2)' }, lineStyle: { color: '#00f0ff', width: 2 }, itemStyle: { color: '#00f0ff' } }]
            });
        }
        
        function initStressChart() {
            stressChart = echarts.init(document.getElementById('stress-chart'));
            stressChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                grid: { left: '12%', right: '8%', top: '15%', bottom: '20%' },
                xAxis: { type: 'category', data: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'], axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' } },
                yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' }, splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.1)' } } },
                series: [{ type: 'line', data: [45, 52, 48, 60, 55, 58], smooth: true, areaStyle: { color: 'rgba(0, 255, 136, 0.2)' }, lineStyle: { color: '#00ff88', width: 2 }, itemStyle: { color: '#00ff88' } }]
            });
        }
        
        function initSensorChart() {
            sensorChart = echarts.init(document.getElementById('sensor-chart'));
            sensorChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                grid: { left: '12%', right: '8%', top: '15%', bottom: '20%' },
                xAxis: { type: 'category', data: ['位移', '沉降', '倾斜', '裂缝', '应力', '振动'], axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7', fontSize: 10 } },
                yAxis: { type: 'value', axisLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.3)' } }, axisLabel: { color: '#8ba3c7' }, splitLine: { lineStyle: { color: 'rgba(0, 240, 255, 0.1)' } } },
                series: [{ type: 'bar', data: [85, 72, 68, 55, 78, 62], itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: '#00f0ff' }, { offset: 1, color: '#00ff88' }] }, borderRadius: [5, 5, 0, 0] } }]
            });
        }
        
        function initAlarmChart() {
            alarmChart = echarts.init(document.getElementById('alarm-chart'));
            alarmChart.setOption({
                backgroundColor: 'transparent',
                tooltip: { trigger: 'item', backgroundColor: 'rgba(10, 20, 40, 0.9)', borderColor: '#00f0ff', textStyle: { color: '#e0f4ff' } },
                series: [{
                    type: 'pie',
                    radius: ['45%', '70%'],
                    center: ['50%', '50%'],
                    avoidLabelOverlap: false,
                    label: { show: false },
                    data: [
                        { value: 335, name: '位移报警', itemStyle: { color: '#ff3366' } },
                        { value: 234, name: '沉降报警', itemStyle: { color: '#ffaa00' } },
                        { value: 154, name: '应力报警', itemStyle: { color: '#00ff88' } },
                        { value: 135, name: '振动报警', itemStyle: { color: '#00f0ff' } },
                        { value: 148, name: '温度报警', itemStyle: { color: '#ff6b35' } }
                    ]
                }]
            });
        }
        
        function updateWarningList() {
            const warningList = document.getElementById('warning-list');
            const warnings = warningData[currentTab] || [];
            warningList.innerHTML = warnings.map(w => `
                <div class="warning-item ${w.level === 'warning' ? 'warning-low' : ''}">
                    <i class="fas fa-exclamation-triangle warning-icon"></i>
                    <div class="warning-content">
                        <div class="warning-title">${w.title}</div>
                        <div class="warning-time">${w.time}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function updateDataTable() {
            const tableBody = document.getElementById('data-table-body');
            const points = monitorPoints[currentTab] || [];
            tableBody.innerHTML = points.slice(0, 6).map(p => {
                let status = 'normal', statusText = '正常';
                if (p.safety < 50) { status = 'danger'; statusText = '告警'; }
                else if (p.safety < 70) { status = 'warning'; statusText = '预警'; }
                return `<tr>
                    <td>${p.name}</td>
                    <td><span class="status-tag ${status}">${statusText}</span></td>
                    <td>${p.safety}</td>
                </tr>`;
            }).join('');
        }
        
        function switchTab(type) {
            currentTab = type;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            
            // 更新统计卡片
            const stats = {
                geology: { monitor: '1,286', warning: '12', normal: '1,268', dataRate: '98.6%' },
                chemical: { monitor: '856', warning: '8', normal: '845', dataRate: '99.1%' },
                mine: { monitor: '428', warning: '5', normal: '420', dataRate: '97.8%' }
            };
            const s = stats[type];
            document.getElementById('monitor-count').textContent = s.monitor;
            document.getElementById('warning-count').textContent = s.warning;
            document.getElementById('normal-count').textContent = s.normal;
            document.getElementById('data-count').textContent = s.dataRate;
            
            updateWarningList();
            updateDataTable();
            
            // 重绘地图Canvas
            drawCurrentSection();
            
            // 更新云图颜色
            if (cloudChart) {
                cloudChart.setOption({
                    series: [{
                        data: [{ value: [85, 72, 68, 55, 78, 62], name: '综合监测指数', areaStyle: { color: businessData[currentTab].color + '40' }, lineStyle: { color: businessData[currentTab].color }, itemStyle: { color: businessData[currentTab].color } }]
                    }]
                });
            }
        }
        
        function handleResize() {
            // 延迟执行确保 DOM 已完成重排
            setTimeout(() => {
                resizeMapCanvas();
                if (cloudChart) cloudChart.resize();
                if (pointCloudChart) pointCloudChart.resize();
                if (trendChart) trendChart.resize();
                if (stressChart) stressChart.resize();
                if (sensorChart) sensorChart.resize();
                if (alarmChart) alarmChart.resize();
            }, 100);
        }
    </script>
