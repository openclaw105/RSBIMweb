<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSBIM 智能安全监测云平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d4ff; --secondary: #00ff88; --warning: #ffaa00; --danger: #ff3366; --bg-dark: #0a0e17; --bg-card: #121a2b; --bg-card-light: #1a2540; --text-primary: #e8f4ff; --text-secondary: #7a8ba3; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(255, 51, 102, 0.03) 0%, transparent 70%), var(--bg-dark); }
        .bg-animation::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; animation: gridMove 20s linear infinite; }
        @keyframes gridMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
        .header { background: linear-gradient(180deg, rgba(18, 26, 43, 0.95) 0%, rgba(18, 26, 43, 0.8) 100%); border-bottom: 1px solid rgba(0, 212, 255, 0.3); padding: 0 30px; height: 80px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); position: relative; }
        .header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent); animation: borderGlow 3s ease-in-out infinite; }
        @keyframes borderGlow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo { width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 24px; color: var(--bg-dark); box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .logo-subtitle { font-size: 12px; color: var(--text-secondary); letter-spacing: 3px; text-transform: uppercase; }
        .stats-section { display: flex; gap: 40px; }
        .stat-item { text-align: center; position: relative; }
        .stat-item::before { content: ''; position: absolute; right: -20px; top: 50%; transform: translateY(-50%); width: 1px; height: 40px; background: linear-gradient(180deg, transparent, var(--primary), transparent); }
        .stat-item:last-child::before { display: none; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 700; color: var(--primary); text-shadow: 0 0 20px rgba(0, 212, 255, 0.5); transition: all 0.3s ease; }
        .stat-value.danger { color: var(--danger); text-shadow: 0 0 20px rgba(255, 51, 102, 0.5); }
        .stat-value.warning { color: var(--warning); }
        .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .status-section { display: flex; align-items: center; gap: 20px; }
        .status-indicator { display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.3); border-radius: 25px; }
        .status-dot { width: 10px; height: 10px; background: var(--secondary); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px var(--secondary); } 50% { box-shadow: 0 0 20px var(--secondary), 0 0 30px var(--secondary); } }
        .status-text { font-size: 14px; color: var(--secondary); font-weight: 500; }
        .time-display { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--text-secondary); }
        .nav-tabs { display: flex; gap: 10px; padding: 15px 30px; background: rgba(18, 26, 43, 0.6); border-bottom: 1px solid rgba(0, 212, 255, 0.1); flex-wrap: wrap; justify-content: center; }
        .nav-tab { padding: 12px 30px; background: transparent; border: 1px solid rgba(0, 212, 255, 0.3); border-radius: 8px; color: var(--text-secondary); font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .nav-tab::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent); transition: left 0.5s ease; }
        .nav-tab:hover::before { left: 100%; }
        .nav-tab:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .nav-tab.active { background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 255, 136, 0.1)); border-color: var(--primary); color: var(--primary); box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        .main-content { display: grid; grid-template-columns: 280px 1fr 320px; gap: 20px; padding: 20px; min-height: calc(100vh - 180px); }
        .card { background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-light) 100%); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 15px; overflow: hidden; position: relative; transition: all 0.3s ease; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary)); background-size: 200% 100%; animation: shimmer 3s linear infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .card:hover { border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 10px 40px rgba(0, 212, 255, 0.1); transform: translateY(-2px); }
        .card-header { padding: 15px 20px; border-bottom: 1px solid rgba(0, 212, 255, 0.1); display: flex; align-items: center; justify-content: space-between; }
        .card-title { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 600; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .card-body { padding: 15px; }
        .left-panel, .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .middle-panel { display: flex; flex-direction: column; gap: 20px; }
        .warning-list { max-height: 300px; overflow-y: auto; }
        .warning-list::-webkit-scrollbar { width: 4px; }
        .warning-list::-webkit-scrollbar-track { background: var(--bg-dark); }
        .warning-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 2px; }
        .warning-item { padding: 12px; margin-bottom: 10px; background: rgba(255, 51, 102, 0.1); border: 1px solid rgba(255, 51, 102, 0.3); border-radius: 8px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .warning-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--danger); }
        .warning-item:hover { background: rgba(255, 51, 102, 0.2); transform: translateX(5px); }
        .warning-item.warning { background: rgba(255, 170, 0, 0.1); border-color: rgba(255, 170, 0, 0.3); }
        .warning-item.warning::before { background: var(--warning); }
        .warning-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .warning-level { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
        .warning-level.danger { background: var(--danger); color: white; }
        .warning-level.warning { background: var(--warning); color: var(--bg-dark); }
        .warning-time { font-size: 11px; color: var(--text-secondary); }
        .warning-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
        .warning-desc { font-size: 11px; color: var(--text-secondary); }
        .device-list { display: flex; flex-direction: column; gap: 10px; }
        .device-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; border: 1px solid rgba(0, 212, 255, 0.1); }
        .device-info { display: flex; align-items: center; gap: 10px; }
        .device-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .device-name { font-size: 13px; font-weight: 600; }
        .device-type { font-size: 11px; color: var(--text-secondary); }
        .device-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .device-dot { width: 8px; height: 8px; border-radius: 50%; }
        .device-dot.online { background: var(--secondary); box-shadow: 0 0 10px var(--secondary); }
        .device-dot.offline { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .map-container { height: 350px; position: relative; background: var(--bg-card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(0, 212, 255, 0.2); }
        #mapChart { width: 100%; height: 100%; }
        .map-legend { display: flex; gap: 15px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; flex: 1; }
        .chart-card { min-height: 250px; }
        .chart-container { width: 100%; height: 200px; }
        .cloud-container { height: 250px; position: relative; }
        #cloudChart { width: 100%; height: 100%; }
        .point-cloud-container { height: 280px; position: relative; }
        #pointCloudChart { width: 100%; height: 100%; }
        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .data-card { padding: 12px; background: rgba(0, 0, 0, 0.2); border-radius: 8px; border: 1px solid rgba(0, 212, 255, 0.1); text-align: center; }
        .data-value { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; color: var(--primary); }
        .data-value.green { color: var(--secondary); }
        .data-value.yellow { color: var(--warning); }
        .data-value.red { color: var(--danger); }
        .data-label { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card { animation: fadeInUp 0.5s ease forwards; }
        .left-panel .card:nth-child(1) { animation-delay: 0.1s; }
        .left-panel .card:nth-child(2) { animation-delay: 0.2s; }
        .middle-panel .card:nth-child(1) { animation-delay: 0.15s; }
        .middle-panel .card:nth-child(2) { animation-delay: 0.25s; }
        .right-panel .card:nth-child(1) { animation-delay: 0.3s; }
        .right-panel .card:nth-child(2) { animation-delay: 0.35s; }
        .right-panel .card:nth-child(3) { animation-delay: 0.4s; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <header class="header">
        <div class="logo-section">
            <div class="logo">R</div>
            <div><div class="logo-text">RSBIM</div><div class="logo-subtitle">智能安全监测云平台</div></div>
        </div>
        <div class="stats-section">
            <div class="stat-item"><div class="stat-value" id="totalMonitors">2,847</div><div class="stat-label">监测点位</div></div>
            <div class="stat-item"><div class="stat-value danger" id="totalAlerts">23</div><div class="stat-label">实时预警</div></div>
            <div class="stat-item"><div class="stat-value warning" id="totalWarnings">56</div><div class="stat-label">注意警示</div></div>
            <div class="stat-item"><div class="stat-value" id="totalNormal">2,768</div><div class="stat-label">正常运行</div></div>
        </div>
        <div class="status-section">
            <div class="status-indicator"><div class="status-dot"></div><span class="status-text">系统正常</span></div>
            <div class="time-display" id="currentTime">2026-03-18 16:00:00</div>
        </div>
    </header>
    <nav class="nav-tabs">
        <button class="nav-tab active" data-type="geology">地质监测</button>
        <button class="nav-tab" data-type="tunnel">隧道监测</button>
        <button class="nav-tab" data-type="tailings">尾矿库</button>
        <button class="nav-tab" data-type="slope">边坡监测</button>
        <button class="nav-tab" data-type="chemical">化工监测</button>
        <button class="nav-tab" data-type="coal">煤矿监测</button>
        <button class="nav-tab" data-type="comprehensive">综合分析</button>
    </nav>
    <main class="main-content">
        <div class="left-panel">
            <div class="card">
                <div class="card-header"><span class="card-title">实时预警</span><span style="color: var(--danger); font-size: 12px;">23条</span></div>
                <div class="card-body"><div class="warning-list" id="warningList"></div></div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-title">设备状态</span></div>
                <div class="card-body"><div class="device-list" id="deviceList"></div></div>
            </div>
        </div>
        <div class="middle-panel">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">监测点分布图</span>
                    <div class="map-legend">
                        <div class="legend-item"><div class="legend-dot" style="background: var(--danger);"></div><span>危险</span></div>
                        <div class="legend-item"><div class="legend-dot" style="background: var(--warning);"></div><span>预警</span></div>
                        <div class="legend-item"><div class="legend-dot" style="background: var(--secondary);"></div><span>正常</span></div>
                    </div>
                </div>
                <div class="map-container"><div id="mapChart"></div></div>
            </div>
            <div class="charts-grid">
                <div class="card chart-card"><div class="card-header"><span class="card-title">位移趋势</span></div><div class="card-body"><div class="chart-container" id="displacementChart"></div></div></div>
                <div class="card chart-card"><div class="card-header"><span class="card-title">监测类型分布</span></div><div class="card-body"><div class="chart-container" id="typeChart"></div></div></div>
                <div class="card chart-card"><div class="card-header"><span class="card-title">应力变化</span></div><div class="card-body"><div class="chart-container" id="stressChart"></div></div></div>
                <div class="card chart-card"><div class="card-header"><span class="card-title">风险雷达</span></div><div class="card-body"><div class="chart-container" id="radarChart"></div></div></div>
            </div>
        </div>
        <div class="right-panel">
            <div class="card"><div class="card-header"><span class="card-title">位移热力图</span></div><div class="card-body"><div class="cloud-container" id="cloudChart"></div></div></div>
            <div class="card"><div class="card-header"><span class="card-title">点云分布</span></div><div class="card-body"><div class="point-cloud-container" id="pointCloudChart"></div></div></div>
            <div class="card">
                <div class="card-header"><span class="card-title">快速统计</span></div>
                <div class="card-body">
                    <div class="data-grid">
                        <div class="data-card"><div class="data-value" id="todayAlerts">12</div><div class="data-label">今日预警</div></div>
                        <div class="data-card"><div class="data-value green" id="onlineRate">98.5%</div><div class="data-label">在线率</div></div>
                        <div class="data-card"><div class="data-value yellow" id="avgDisplacement">2.3mm</div><div class="data-label">平均位移</div></div>
                        <div class="data-card"><div class="data-value red" id="maxDisplacement">15.7mm</div><div class="data-label">最大位移</div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        initTime(); initWarningList(); initDeviceList(); initMapChart(); initDisplacementChart(); initTypeChart(); initStressChart(); initRadarChart(); initCloudChart(); initPointCloudChart();
    });
    function initTime() {
        function updateTime() { document.getElementById('currentTime').textContent = new Date().toISOString().replace('T', ' ').substring(0, 19); }
        updateTime(); setInterval(updateTime, 1000);
    }
    function initWarningList() {
        const warnings = [
            { level: 'danger', title: 'A-12号边坡位移超限', desc: '位移量: 15.7mm > 阈值12mm', time: '16:02:35' },
            { level: 'danger', title: 'B-03号隧道收敛异常', desc: '收敛速率: 3.2mm/d > 阈值2mm/d', time: '15:58:22' },
            { level: 'warning', title: 'C-07号尾矿库渗流量偏高', desc: '渗流量: 85L/min > 正常值60L/min', time: '15:45:18' },
            { level: 'warning', title: 'D-15号监测点数据波动', desc: '数据离散度超限，需人工复核', time: '15:32:05' },
            { level: 'danger', title: 'E-08号深部水平位移告警', desc: '位移速率: 4.1mm/d > 阈值3mm/d', time: '15:18:47' },
            { level: 'warning', title: 'F-21号地下水位异常', desc: '水位变化: +1.2m，超过预警值', time: '14:55:33' }
        ];
        document.getElementById('warningList').innerHTML = warnings.map(w => '<div class="warning-item ' + w.level + '"><div class="warning-header"><span class="warning-level ' + w.level + '">' + (w.level === 'danger' ? '危险' : '警告') + '</span><span class="warning-time">' + w.time + '</span></div><div class="warning-title">' + w.title + '</div><div class="warning-desc">' + w.desc + '</div></div>').join('');
    }
    function initDeviceList() {
        const devices = [
            { name: 'GNSS接收机 A-01', type: '位移监测', status: 'online' },
            { name: '渗压计 B-12', type: '渗流监测', status: 'online' },
            { name: '测斜仪 C-05', type: '深部位移', status: 'offline' },
            { name: '水位计 D-08', type: '水位监测', status: 'online' },
            { name: '应变计 E-15', type: '应力监测', status: 'online' }
        ];
        document.getElementById('deviceList').innerHTML = devices.map(d => '<div class="device-item"><div class="device-info"><div class="device-icon"></div><div><div class="device-name">' + d.name + '</div><div class="device-type">' + d.type + '</div></div></div><div class="device-status"><div class="device-dot ' + d.status + '"></div><span>' + (d.status === 'online' ? '在线' : '离线') + '</span></div></div>').join('');
    }
    function initMapChart() {
        const chart = echarts.init(document.getElementById('mapChart'));
        const data = [];
        for (let i = 0; i < 50; i++) { const cat = ['danger', 'warning', 'normal'][Math.floor(Math.random() * 3)]; data.push({ value: [Math.random() * 100, Math.random() * 100], symbolSize: cat === 'danger' ? 15 : cat === 'warning' ? 12 : 8, itemStyle: { color: cat === 'danger' ? '#ff3366' : cat === 'warning' ? '#ffaa00' : '#00ff88' } }); }
        chart.setOption({ backgroundColor: 'transparent', grid: { top: 10, bottom: 10, left: 10, right: 10 }, xAxis: { show: false, min: 0, max: 100 }, yAxis: { show: false, min: 0, max: 100 }, series: [{ type: 'scatter', data: data, emphasis: { scale: 1.5 } }] });
        window.addEventListener('resize', () => chart.resize());
    }
    function initDisplacementChart() {
        const chart = echarts.init(document.getElementById('displacementChart'));
        const hours = []; const data1 = []; const data2 = []; const now = new Date();
        for (let i = 0; i < 24; i++) { hours.push((now.getHours() - 23 + i + 24) % 24 + ':00'); data1.push(Math.random() * 10 + 2); data2.push(Math.random() * 8 + 1); }
        chart.setOption({ backgroundColor: 'transparent', tooltip: { trigger: 'axis' }, legend: { data: ['位移量', '位移速率'], textStyle: { color: '#7a8ba3' }, top: 0 }, grid: { top: 40, bottom: 20, left: 40, right: 20 }, xAxis: { type: 'category', data: hours, axisLine: { lineStyle: { color: '#2a3a50' } }, axisLabel: { color: '#7a8ba3', fontSize: 10 } }, yAxis: { type: 'value', axisLine: { lineStyle: { color: '#2a3a50' } }, axisLabel: { color: '#7a8ba3', fontSize: 10 }, splitLine: { lineStyle: { color: '#1a2540' } } }, series: [{ name: '位移量', type: 'line', data: data1, smooth: true, lineStyle: { color: '#00d4ff', width: 2 }, itemStyle: { color: '#00d4ff' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(0, 212, 255, 0.3)' }, { offset: 1, color: 'rgba(0, 212, 255, 0)' }] } } }, { name: '位移速率', type: 'line', data: data2, smooth: true, lineStyle: { color: '#00ff88', width: 2 }, itemStyle: { color: '#00ff88' } }] });
        window.addEventListener('resize', () => chart.resize());
    }
    function initTypeChart() {
        const chart = echarts.init(document.getElementById('typeChart'));
        chart.setOption({ backgroundColor: 'transparent', tooltip: { trigger: 'item' }, legend: { orient: 'vertical', right: 10, top: 'center', textStyle: { color: '#7a8ba3' } }, series: [{ type: 'pie', radius: ['40%', '70%'], center: ['40%', '50%'], avoidLabelOverlap: false, itemStyle: { borderRadius: 5, borderColor: '#121a2b', borderWidth: 2 }, label: { show: false }, emphasis: { label: { show: true, fontSize: 14, fontWeight: 'bold' } }, data: [{ value: 1048, name: '位移监测', itemStyle: { color: '#00d4ff' } }, { value: 735, name: '渗流监测', itemStyle: { color: '#00ff88' } }, { value: 580, name: '应力监测', itemStyle: { color: '#ffaa00' } }, { value: 484, name: '水位监测', itemStyle: { color: '#ff3366' } }, { value: 300, name: '温度监测', itemStyle: { color: '#a855f7' } }] }] });
        window.addEventListener('resize', () => chart.resize());
    }
    function initStressChart() {
        const chart = echarts.init(document.getElementById('stressChart'));
